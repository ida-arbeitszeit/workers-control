{% extends "base.html" %}

{% block content %}
<section class="section columns has-text-centered">
    <div class="column"></div>
    <div class="column is-two-thirds">
        <div class="pb-5">
            <h1 class="title">
                {{ view_model.name }}
            </h1>
        </div>
        <div class="box has-text-left">
            <p><strong>{{ gettext("Provider:") }}</strong> {{ view_model.provider_name }}</p>
            <p><strong>{{ gettext("Description:") }}</strong> {{ view_model.description }}</p>
            <p><strong>{{ gettext("Created on:") }}</strong> {{ view_model.created_on }}</p>
        </div>
    </div>
    <div class="column"></div>
</section>
{% endblock %}
